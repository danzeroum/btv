[project]
name = "btv-review"
version = "0.1.0"
description = "Review orientado a valor da plataforma BuildToValue: reviewers, value_score, quality gates"
requires-python = ">=3.11"
# btv-promptforge só pelo canonical_json/sha256_hex (evidence_hash da
# certificação) — reusa o mesmo esquema de hash do prompt-cache-key.v1 em
# vez de inventar um segundo algoritmo de hash no projeto.
dependencies = ["pydantic>=2", "btv-promptforge"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/btv_review"]

[tool.uv.sources]
btv-promptforge = { workspace = true }
