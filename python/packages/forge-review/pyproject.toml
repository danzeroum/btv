[project]
name = "forge-review"
version = "0.1.0"
description = "Review orientado a valor da plataforma Forge: reviewers, value_score, quality gates"
requires-python = ">=3.11"
dependencies = ["pydantic>=2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_review"]
