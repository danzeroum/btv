[project]
name = "btv-promptforge"
version = "0.1.0"
description = "Camada de prompts da plataforma BuildToValue: geradores, knowledge base, quality linter"
requires-python = ">=3.11"
dependencies = ["pydantic>=2", "grpcio>=1.60", "btv-proto-py"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/btv_promptforge"]

[tool.uv.sources]
btv-proto-py = { workspace = true }
