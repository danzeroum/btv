[project]
name = "forge-squad"
version = "0.1.0"
description = "Squad multi-agente da plataforma Forge: orquestração, consenso, planejamento, HITL"
requires-python = ">=3.11"
dependencies = ["pydantic>=2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_squad"]
