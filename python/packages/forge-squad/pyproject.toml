[project]
name = "forge-squad"
version = "0.1.0"
description = "Squad multi-agente da plataforma Forge: orquestração, consenso, planejamento, HITL"
requires-python = ">=3.11"
# grpcio + forge-proto-py são exigidos pelo servidor SquadService e pelos
# clients gRPC (server.py/grpc_clients.py); o núcleo do squad (agentes,
# orquestrador, consenso) só precisa de pydantic.
dependencies = ["pydantic>=2", "grpcio>=1.60", "forge-proto-py"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_squad"]

[tool.uv.sources]
forge-proto-py = { workspace = true }
