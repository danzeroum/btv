[project]
name = "forge-promptforge"
version = "0.1.0"
description = "Camada de prompts da plataforma Forge: geradores, knowledge base, quality linter"
requires-python = ">=3.11"
dependencies = ["pydantic>=2", "grpcio>=1.60", "forge-proto-py"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_promptforge"]

[tool.uv.sources]
forge-proto-py = { workspace = true }
