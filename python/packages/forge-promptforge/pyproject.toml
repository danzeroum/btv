[project]
name = "forge-promptforge"
version = "0.1.0"
description = "Camada de prompts da plataforma Forge: geradores, knowledge base, quality linter"
requires-python = ">=3.11"
dependencies = ["pydantic>=2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forge_promptforge"]
