name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # uv é necessário para o teste de integração cross-process do
      # sidecar (btv-sidecar/tests/python_sidecar.rs sobe o servidor
      # Python de verdade); sem ele o teste pula graciosamente.
      - uses: astral-sh/setup-uv@v5
      - run: cd python && uv sync
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all --check

  # Lint arquitetural (Trilha T4 do plano DDD multitenant): o futuro
  # btv-domain não pode depender de rusqlite/axum/tonic/reqwest (nem
  # transitivamente) e arquivo de handler HTTP não pode conter SQL cru. A
  # checagem de dependência arma sozinha quando o crate btv-domain nascer —
  # até lá o script avisa e pula só essa metade. cargo-deny não serve aqui:
  # `[bans]` é global do grafo, não por-crate.
  arch-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: ./scripts/arch-lint.sh

  # Mudança BREAKING nos protos não passa despercebida (Trilha T5 da migração
  # DDD; a regra do repo — protos evoluem só aditivamente — vira gate).
  # Baseline = o commit-base do PR, materializado como branch local porque o
  # input git do buf clona o .git e um clone só enxerga refs/heads/* (um SHA
  # cru não estaria alcançável). Só roda em PR: em push para main o baseline
  # seria o próprio HEAD — comparação decorativa, contra a cultura do repo.
  # Provado nos dois sentidos ao nascer: remoção de campo falha (exit 100),
  # campo novo com tag nova passa.
  buf:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: git branch ci-buf-baseline "${{ github.event.pull_request.base.sha }}"
      - run: buf breaking schemas/proto --against '.git#branch=ci-buf-baseline,subdir=schemas/proto'

  # B4 (ADR 0026): o adapter Postgres julgado pela MESMA suíte de contrato
  # que julga o SQLite, contra um Postgres REAL (service container — mesmo
  # espírito do job `sandbox`, que exige o daemon Docker de verdade). Sem a
  # env BTV_PG_TEST_URL os testes PG pulam com aviso barulhento; aqui ela
  # sempre existe, então a metade PG roda de verdade em todo PR. Inclui o
  # teste ADVERSARIAL de RLS (role sem privilégio + SQL adulterado) e o juiz
  # da decisão do ADR 0028 (appends concorrentes de pools separados).
  pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p btv-store --features pg
        env:
          BTV_PG_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      # O gate de clippy do job `rust` roda sem features — o código do
      # adapter PG (e o comando `btv session` da E1s.1) só é lintado aqui.
      - run: cargo clippy -p btv-store --features pg -- -D warnings
      # E1s.1: o comando `btv session issue` só compila sob a feature `pg` do
      # btv-cli — o build default não o tem. Compila e linta o caminho saas.
      - run: cargo clippy -p btv-cli --features pg -- -D warnings

  # Gate de supply-chain (advisories/licenças) — porte da rust-migration.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Bloqueante (postura herdada do fork do opencode): segredos não entram.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Self-hosting (Fase 5 Onda 6, ADR 0010): a plataforma se verifica com sua
  # própria ferramenta. Job separado do `rust` de propósito — não arrisca o
  # gate que já funciona; a fusão dos dois é possível depois. `btv verify`
  # já sai com exit ≠0 em veredito Fail (Onda 2) — isso sozinho é o gate;
  # o artefato é só a evidência anexada ao run para auditoria.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `btv verify` roda `cargo test --workspace` como parte dos
      # default_steps() — precisa de uv pelo mesmo motivo que o job `rust`
      # precisa (ver comentário lá).
      - uses: astral-sh/setup-uv@v5
      - run: cd python && uv sync
      - run: cargo run -p btv-cli -- verify --out verification-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-evidence
          path: verification-evidence.json

  # Testes de integração pesada do btv-tools (`#[ignore]` no `cargo test`
  # normal — aparecem como "ignored", nunca verdes por engano; aqui rodam DE
  # VERDADE com `--include-ignored`). Job separado porque exigem dependências
  # externas que o gate `rust` não deve arriscar:
  #  - Contenção do sandbox Docker (Fase 6 Onda 2): os quatro vetores (escrita
  #    fora do mount, rede proibida, timeout, memória) exigem um daemon Docker (o
  #    runner ubuntu tem). O helper `daemon_obrigatorio` FALHA se o daemon não
  #    responder — um teste de contenção que "passa" sem containerizar nada seria
  #    um falso positivo catastrófico.
  #  - Cliente LSP real (Fase 6 Onda 5): dirige o rust-analyzer DE VERDADE contra
  #    um fixture cargo e assere a definição semântica por igualdade. A componente
  #    `rust-analyzer` é instalada abaixo; a guarda no teste FALHA se ela faltar
  #    (mesma postura anti-falso-positivo do sandbox).
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Confirma que o daemon responde antes — o teste depende dele de propósito.
      - run: docker version
      # O cliente LSP real precisa da componente rust-analyzer (a guarda do teste
      # falha se ela não estiver disponível).
      - run: rustup component add rust-analyzer
      - run: cargo test -p btv-tools -- --include-ignored

  # Benches criterion (Fase 6 Onda 8): compilam e RODAM de verdade, produzindo o
  # baseline comparável dos caminhos quentes (hash canônico, épocas de contexto,
  # gateway sem key via ScriptedGenerator). Job separado porque o profile `bench`
  # é caro e não deve arriscar o gate `rust`. Tempos de medição reduzidos: o
  # objetivo aqui é provar que os benches RODAM (não bit-rot) e produzem baseline,
  # não cravar regressão (não há baseline armazenado a comparar entre runs).
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Cada `--bench` alvo é preciso de propósito: sem ele, `cargo bench` também
      # rodaria os unittests da lib e os testes de integração sob o harness do
      # libtest, que rejeita as flags do criterion (`--warm-up-time`). Assim as
      # flags só chegam aos binários criterion. Tempos reduzidos (prova que rodam
      # e produzem baseline, não crava regressão).
      - run: cargo bench -p btv-schemas --bench canonical -- --warm-up-time 0.5 --measurement-time 1
      - run: cargo bench -p btv-core --bench compaction -- --warm-up-time 0.5 --measurement-time 1
      - run: cargo bench -p btv-llm --bench gateway -- --warm-up-time 0.5 --measurement-time 1

  # Load-test k6 do caminho do gateway (Fase 6 Onda 8b, critério de conclusão
  # nº 3): sobe o endpoint de carga (`loadgen`, que embrulha o ScriptedGenerator
  # — sem key real), martela com k6 e valida o P95 sob o limiar. O threshold vive
  # no script (`p(95)<100`); o k6 sai ≠0 se estourar — o gate é REAL, não
  # decorativo. Job separado (precisa do binário de pé + k6 instalado), não
  # arrisca o gate `rust`.
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: grafana/setup-k6-action@v1
      - name: Sobe o endpoint de carga e espera ficar pronto
        run: |
          cargo build -p btv-server --bin loadgen
          ./target/debug/loadgen &
          echo $! > loadgen.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:7900/health && break
            sleep 1
          done
      - name: Roda o k6 (valida o P95 — sai ≠0 se o threshold estourar)
        run: k6 run infra/k6/gateway_load.js
      - name: Encerra o endpoint de carga
        if: always()
        run: kill "$(cat loadgen.pid)" 2>/dev/null || true

  # Frontend (Fase 7 Onda 1): o harness Playwright de integração real já
  # existia (`web/tests/e2e-integration/`, sobe um `btv dashboard` real
  # contra sqlite real) mas não era exercitado por nenhum job — regressão do
  # front passava despercebida. `pnpm build` roda o typecheck (tsc -b) antes do
  # bundle; `test:e2e:integration` builda + sobe o binário real via cargo, por
  # isso o toolchain Rust entra aqui também.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # uv é necessário aqui pelo mesmo motivo do job `rust`: o e2e de
      # integração do squad (squad-real-backend.spec.ts) sobe o
      # `btv_squad.server` real via `uv run`. Sem resolver o venv antes,
      # o primeiro `uv run` da suíte tenta baixar as dependências a frio e
      # estoura o timeout dos testes Playwright (achado real — Onda 4).
      - uses: astral-sh/setup-uv@v5
      - run: cd ../python && uv sync
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@10
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:integration

  # Frontend do BuildToValue (btv-web/, a SPA primária servida na raiz pelo
  # `btv dashboard`; o console BuildToValue acima fica em /dev). Vitest + typecheck
  # (via `pnpm build`, que roda `tsc -b`) + Playwright de UI (shell,
  # navegação, ajustes rápidos — vite dev, sem backend).
  btv-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btv-web
    steps:
      # submodules: o Squad Designer (U5) consome a lib bpmn de vendor/bpmn
      # (pinada); scripts/ensure-bpmn.mjs constrói o dist dela no prebuild.
      - uses: actions/checkout@v4
        with:
          submodules: true
      # Rust: a suíte de integração sobe o `btv dashboard` real (mesma
      # razão do job `web`).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # uv: a ativação de squad pela galeria (squad-real-backend.spec.ts)
      # sobe o `btv_squad.server` real via `uv run` — mesma razão do job
      # `web` (resolver o venv a frio estouraria o timeout do Playwright).
      - uses: astral-sh/setup-uv@v5
      - run: cd ../python && uv sync
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@10
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm test:e2e:integration

  # Cobertura de testes (T1 do roadmap) — NÃO bloqueante (`continue-on-error`):
  # relatório informativo, nunca reprova o PR. Troca os ⟨medir⟩ da doc de
  # cobertura por números REAIS (artefato do run). O gate de comportamento
  # continua sendo `rust`/`verify`/`sandbox`, não a % de linha. Só em PR.
  coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      # `--exclude btv-proto` (stubs gerados); sem uv aqui, os testes
      # cross-process do sidecar pulam graciosamente (como no job `rust`).
      - name: Cobertura Rust (tarpaulin)
        continue-on-error: true
        run: cargo tarpaulin --workspace --exclude btv-proto --out Xml --timeout 300 --skip-clean
      - uses: astral-sh/setup-uv@v5
      # `uv run --with pytest-cov` adiciona a dep de forma efêmera — sem tocar
      # o pyproject nem o `uv.lock` (o job `python` segue idêntico).
      - name: Cobertura Python (pytest-cov)
        continue-on-error: true
        working-directory: python
        run: uv run --with pytest-cov pytest --cov=packages --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            cobertura.xml
            python/coverage.xml
          if-no-files-found: ignore
