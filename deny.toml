# cargo-deny — gate de supply-chain (advisories / licenças / bans / sources).
# Porte do deny.toml da branch rust-migration do opencode (ADR 0002).
[advisories]
version = 2
yanked = "deny"
# Vulnerabilidades falham o build (default do cargo-deny); "unmaintained"
# só é avaliado para dependências diretas do workspace.
unmaintained = "workspace"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "Unlicense",
  # webpki-roots (CAs da Mozilla embutidas para o backend rustls) usa a
  # Community Data License Agreement permissiva.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
