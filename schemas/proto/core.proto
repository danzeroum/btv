// CoreService — serviços que o núcleo Rust expõe ao sidecar Python.
// Regra de ouro: o sidecar nunca fala com provedores LLM nem toca disco
// diretamente; tudo passa por aqui (keys, permissões e ledger ficam no core).
syntax = "proto3";

package btv.core.v1;

import "llm.proto";

service CoreService {
  // Geração LLM via gateway (streaming de chunks).
  rpc Generate(btv.llm.v1.LlmRequest) returns (stream btv.llm.v1.LlmChunk);
  // Execução de ferramenta sujeita ao motor de permissões.
  rpc RunTool(ToolCall) returns (ToolResult);
  // Pedido de permissão/escalonamento HITL (decisão vem da TUI).
  rpc RequestPermission(PermissionRequest) returns (PermissionDecision);

  // REMOVIDOS (ADR 0034 — 2ª quebra de wire assinada; `buf breaking` acusa por
  // design): `AppendLedger`, `Recall`, `Remember` e suas mensagens
  // (`LedgerAppend`/`LedgerAck`/`RecallRequest`/`RecallResponse`/
  // `RememberRequest`/`RememberAck`). Eram stubs `Unimplemented` da Fase 4 na
  // direção ERRADA (Rust servindo memória/ledger ao Python) — superados pelo
  // `MemoryService` (Python serve, Rust chama; ADR 0022). Protobuf não reserva
  // RPC; a memória correta vive em `memory.proto`.
}

message ToolCall {
  string tool = 1;
  string args_json = 2;
  // Informativo — o lado Rust SEMPRE recalcula o escopo real a partir de
  // args_json (Tool::scope) para a decisão de permissão; este campo nunca
  // é a fonte de verdade para Allow/Ask/Deny.
  string scope = 3;
}

message ToolResult {
  string content = 1;
  bool truncated = 2;
  // 0 = sucesso; 1 = erro de execução/args inválidos/ferramenta desconhecida
  // (nunca chegou a rodar, ou rodou e falhou); -1 = negado pelo motor de
  // permissões ou por um humano (nunca chegou a executar).
  int32 exit_code = 3;
}

message PermissionRequest {
  string tool = 1;
  string scope = 2;
  string reason = 3;
  // Confiança do agente na ação (gatilho HITL: < 0.3/0.5).
  double confidence = 4;
}

message PermissionDecision {
  enum Decision {
    DECISION_UNSPECIFIED = 0;
    ALLOW = 1;
    DENY = 2;
  }
  Decision decision = 1;
  optional string operator_note = 2;
}
