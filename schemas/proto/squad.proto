// SquadService — serviço que o sidecar Python expõe ao núcleo Rust.
// Um ExecuteTask devolve um stream de SquadEvent: propostas, votos,
// consenso, handoffs (start/ack/complete/error) e pedidos de HITL,
// renderizados ao vivo no painel do squad da TUI.
syntax = "proto3";

package btv.squad.v1;

service SquadService {
  rpc ExecuteTask(SquadTask) returns (stream SquadEvent);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message SquadTask {
  string task_id = 1;
  string description = 2;
  // Tipo de decisão dominante (ex.: "architecture", "implementation").
  string decision_type = 3;
  // Nível máximo de autonomia permitido (autonomia progressiva).
  uint32 max_autonomy_level = 4;
  // `verification-evidence.v1` (btv-verify::run_pipeline), rodada pelo `btv
  // squad` antes de disparar a tarefa — Fase 5 Onda 3. D3t (G3): antes
  // `string verification_evidence_json` (JSON opaco), agora mensagem TIPADA
  // espelhando o schema. É o ÚNICO breaking de wire da campanha — `buf
  // breaking` acusa por DESIGN (quebra assinada, não silenciosa; ADR 0030);
  // Rust e Python sobem juntos no mesmo repo (janela de deploy coordenada).
  // Ausente (campo não setado, `HasField` falso) segue fail-closed no lado
  // Python (server.py), nunca "sem evidência = ok".
  VerificationEvidence verification_evidence = 5;
  // Modelo LLM a usar NESTA tarefa (ex.: "deepseek-chat"). Vazio = herda o
  // default do pool/sidecar (`--model`). Permite a tela Modelo/o `--model`
  // controlarem o squad por tarefa, em vez de um modelo fixo por processo.
  string model = 6;
  // Roster de personas desta ativação (U7). Cada uma vira um agente REAL cujo
  // system prompt É `prompt` — editar/criar uma persona no frontend muda quem
  // trabalha e como. Vazio = motor default (elenco fixo architect/developer/
  // auditor/…), para retrocompatibilidade. `funcao`/`ordem` montam o pipeline
  // por domínio (roster configurável em vez de agentes fixos).
  repeated PersonaSpec roster = 7;
  // D2t (pós-G2): dono e operador da tarefa — o encanamento multitenant
  // existe ANTES de a E1s torná-lo real na borda HTTP. Hoje todo caller
  // envia o tenant LOCAL; o orquestrador PROPAGA (nunca inventa) os dois
  // campos em todo SquadEvent emitido. Aditivo: vazio = comportamento
  // pré-D2t (nenhum broker no meio exige os campos).
  string tenant_id = 8;
  string actor = 9;
}

// Uma persona/papel do roster de uma squad.
message PersonaSpec {
  // Nome do papel/persona (ex.: "Redator", "Fact-checker").
  string papel = 1;
  // System prompt efetivo (override de U7 ?? padrão do arquétipo, ou o prompt
  // de uma persona própria criada pelo usuário).
  string prompt = 2;
  // Função no workflow: "plan" | "produce" | "review" | "validate" | "deliver".
  // Guia como o orquestrador encaixa a persona no pipeline por domínio.
  string funcao = 3;
  // Posição no roster (0-based) — a ordem em que a persona atua.
  uint32 ordem = 4;
  // Persona PRÓPRIA do usuário (U7), não um papel do arquétipo do template.
  bool custom = 5;
}

message SquadEvent {
  string task_id = 1;
  string ts = 2;
  // D2t: ecoados VERBATIM do SquadTask que originou o stream — o Python
  // propaga, nunca decide tenant. Vazio quando o task veio sem (pré-D2t).
  string tenant_id = 10;
  string actor = 11;
  oneof payload {
    Proposal proposal = 3;
    Consensus consensus = 4;
    Handoff handoff = 5;
    HitlEscalation hitl = 6;
    StepResult step = 7;
    string error = 8;
    ChatMessage chat = 9;
  }
}

// Mensagem de conversa do squad ao vivo — renderizada como chat ao lado da
// esteira. `author_role` ("AGENT"|"HUMAN"|"SYSTEM") distingue um membro-agente
// do membro-humano; `author` é o nome de exibição (papel). Aditivo à Fase 7:
// dá voz aos agentes e ao usuário como MEMBRO da squad, não só aprovador.
message ChatMessage {
  string author = 1;
  string author_role = 2;
  string text = 3;
  string in_reply_to = 4;
}

message Proposal {
  string agent = 1;
  double confidence = 2;
  string content_json = 3;
}

message Consensus {
  string decision_maker = 1;
  double strength = 2;
  string decision_json = 3;
  bool requires_human = 4;
}

message Handoff {
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    START = 1;
    ACK = 2;
    COMPLETE = 3;
    ERROR = 4;
  }
  Phase phase = 1;
  string from_agent = 2;
  string to_agent = 3;
  string contract = 4;
  string payload_digest = 5;
}

message HitlEscalation {
  string reason = 1;
  double confidence = 2;
}

message StepResult {
  string step_id = 1;
  bool success = 2;
  string summary = 3;
}

// Evidência do pipeline de verificação determinística (/verify), espelhando o
// schema `verification-evidence.v1` (D3t). Antes viajava como string JSON no
// campo `verification_evidence_json`; agora é tipada no wire — o lado Python
// valida contra tipo em vez de `dict[str, Any]`.
message VerificationEvidence {
  string run_id = 1;
  string git_sha = 2;
  repeated VerificationStep steps = 3;
  Verdict verdict = 4;
  // RFC3339 (schema: `date-time`).
  string produced_at = 5;
}

message VerificationStep {
  // Nome do passo (ex.: "typecheck", "test", "lint", "sast").
  string name = 1;
  // Ferramenta executada (ex.: "cargo test", "pytest", "clippy").
  string tool = 2;
  int32 exit_code = 3;
  uint64 duration_ms = 4;
  repeated VerificationFinding findings = 5;
}

message VerificationFinding {
  string tool = 1;
  string severity = 2;
  string message = 3;
  // Opcionais no schema — `optional` preserva presença (ausência ≠ vazio),
  // espelhando o `skip_serializing_if = Option::is_none` do lado Rust.
  optional string file = 4;
  optional uint64 line = 5;
}

// Veredito do pipeline (schema: enum ["pass","fail","skipped"]).
// `VERDICT_UNSPECIFIED` = zero-value proto3; tratado como ausente/fail-closed.
enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  VERDICT_PASS = 1;
  VERDICT_FAIL = 2;
  VERDICT_SKIPPED = 3;
}

message HealthRequest {}

message HealthResponse {
  bool ready = 1;
  string version = 2;
}
